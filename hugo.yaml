baseURL: "https://www.mypodcastlistening.com/"
languageCode: "en-us"
title: "The Multi-Agent Future"
theme: "PaperMod"
paginate: 10
enableRobotsTXT: true
buildDrafts: false
buildFuture: false

minify:
  disableXML: true
  minifyOutput: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  title: "The Multi-Agent Future"
  description: "Real stories of building AI multi-agent systems — from automated trading bots to AI-managed organizations. No hype, just code and lessons."
  keywords:
    - AI agents
    - multi-agent systems
    - algorithmic trading
    - AI automation
    - LLM agents
    - autonomous AI
  author: "JY"
  defaultTheme: dark
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  homeInfoParams:
    Title: "Building the Multi-Agent Future"
    Content: >
      I build AI agent systems that trade crypto, manage stock portfolios, and run themselves.
      This is the real, unfiltered story — the code, the failures, the 4AM debugging sessions, 
      and what actually works. No marketing fluff. Just a dev who can't stop shipping.

  socialIcons:
    - name: github
      url: "https://github.com/junyong8698-dot"
    - name: rss
      url: "/index.xml"

  assets:
    favicon: "/favicon.ico"
    disableHLJS: true

  cover:
    linkFullImages: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys:
      - title
      - permalink
      - summary
      - content

related:
  includeNewer: true
  threshold: 80
  toLower: true
  indices:
    - name: series
      weight: 200
    - name: tags
      weight: 100
    - name: categories
      weight: 50

imaging:
  hint: photo
  quality: 75

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main:
    - identifier: series
      name: Series
      url: /series/
      weight: 10
    - identifier: daily
      name: Daily Log
      url: /categories/daily-log/
      weight: 20
    - identifier: news
      name: News & Analysis
      url: /categories/news-analysis/
      weight: 30
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 40
    - identifier: about
      name: About
      url: /about/
      weight: 45
    - identifier: search
      name: Search
      url: /search/
      weight: 50

taxonomies:
  category: categories
  tag: tags
  series: series
