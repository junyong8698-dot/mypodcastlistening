<!-- JSON-LD Article -->
{{ if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": {{ .Title | plainify | htmlUnescape | jsonify }},
  "description": {{ (.Description | default (.Summary | plainify | htmlUnescape) | truncate 160) | jsonify }},
  "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
  "author": { "@type": "Person", "name": "{{ site.Params.author | default "JY" }}" },
  "publisher": { "@type": "Organization", "name": "{{ site.Title }}", "url": "{{ site.BaseURL }}" },
  "mainEntityOfPage": { "@type": "WebPage", "@id": "{{ .Permalink }}" },
  "wordCount": {{ .WordCount }}
}
</script>
{{ end }}

<!-- BreadcrumbList -->
{{ if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "{{ site.BaseURL }}"
    }
    {{ if .CurrentSection }}
    ,{
      "@type": "ListItem",
      "position": 2,
      "name": {{ .CurrentSection.Title | plainify | jsonify }},
      "item": "{{ .CurrentSection.Permalink }}"
    }
    ,{
      "@type": "ListItem",
      "position": 3,
      "name": {{ .Title | plainify | htmlUnescape | jsonify }}
    }
    {{ else }}
    ,{
      "@type": "ListItem",
      "position": 2,
      "name": {{ .Title | plainify | htmlUnescape | jsonify }}
    }
    {{ end }}
  ]
}
</script>
{{ end }}

<!-- Canonical URL -->
<link rel="canonical" href="{{ .Permalink }}" />
